  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="./manifest.json" />
  
  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

  <style>
    :root {
      --primary: #0f766e;
      --primary-dark: #0d5c56;
      --accent: #14b8a6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100dvh;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(15, 118, 110, 0.3);
    }

    .header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-subtitle {
      font-size: 0.7rem;
      opacity: 0.85;
      margin-top: 1px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .icon-btn:active {
      background: rgba(255,255,255,0.25);
    }

    /* Map */
    #map {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
    }

    /* Bottom Panel */
    .bottom-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      background: var(--card);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      max-height: 52vh;          /* 滚动页面做小一点，让地图更显眼 */
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      overflow: hidden;
    }

    .bottom-panel.collapsed {
      transform: translateY(calc(100% - 70px));
    }

    .panel-handle {
      width: 40px;
      height: 5px;
      background: #cbd5e1;
      border-radius: 3px;
      margin: 8px auto 4px;
      cursor: pointer;
    }

    .panel-header {
      padding: 0 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .panel-header {
        padding: 0 16px 6px;
      }
      .panel-title {
        font-size: 0.95rem;
      }
    }

    .panel-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
    }

    .nearby-count {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      padding: 8px 16px 12px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-chip {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.8rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 480px) {
      .filter-chip {
        padding: 6px 10px;
        font-size: 0.75rem;
      }
    }

    .filter-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Station List */
    .station-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 40px;
      -webkit-overflow-scrolling: touch;
    }

    .station-card {
      background: #f8fafc;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      overflow: visible;          /* 确保按钮不会被裁切 */
    }

    .station-card:active {
      transform: scale(0.98);
      background: #f1f5f9;
    }

    .station-card.selected {
      border-color: var(--primary);
      background: #f0fdfa;
    }

    .station-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .station-name {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.3;
    }

    .station-cpo {
      font-size: 0.75rem;
      color: var(--primary);
      font-weight: 500;
      margin-top: 2px;
    }

    .station-distance {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      background: white;
      padding: 3px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .station-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }

    .badge-dc {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .badge-ac {
      background: #d1fae5;
      color: #047857;
    }

    .badge-power {
      background: #fef3c7;
      color: #b45309;
    }

    .badge-status {
      background: #dcfce7;
      color: #15803d;
    }

    .badge-status.busy {
      background: #fee2e2;
      color: #b91c1c;
    }

    .station-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1 1 140px;
      min-width: 140px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
      min-height: 44px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:active {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:active {
      background: #f1f5f9;
    }

    /* Location button */
    .locate-btn {
      position: absolute;
      right: 16px;
      bottom: 200px;
      z-index: 900;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
      border: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .locate-btn:active {
      transform: scale(0.95);
    }

    /* Loading / Status */
    .status-bar {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      background: rgba(15, 23, 42, 0.9);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .status-bar.show {
      display: flex;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    /* Custom marker */
    .custom-marker {
      background: var(--primary);
      border: 3px solid white;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      width: 28px;
      height: 28px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .custom-marker.dc {
      background: #2563eb;
    }

    /* Detail Modal (simple) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: white;
      width: 100%;
      max-width: 500px;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f1f5f9;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .modal-cpo-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #f0fdfa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--primary);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-actions .btn {
      padding: 14px;
    }

    /* Responsive */
    @media (min-width: 768px) {
      .bottom-panel {
        max-width: 420px;
        left: 16px;
        right: auto;
        border-radius: 16px;
        bottom: 16px;
        max-height: 70vh;
      }
      .locate-btn {
        right: 450px;
      }
    }
  </style>
</head>

      <button class="icon-btn" id="btn-nearby" title="附近充电站" style="font-size:0.9rem;">📍</button>
      <button class="icon-btn" id="btn-refresh" title="刷新">↻</button>
    </div>
  </header>

    <div class="spinner"></div>

      </div>

        id: 49,
        name: "Singapore Woodlands Causeway",
        cpo: "JomCharge",
        lat: 1.4300,
        lng: 103.7700,
        type: "DC",
        power: "120-180kW",
        connectors: "CCS2",
        status: "available",
        address: "Woodlands, Singapore (near Causeway)",
        price: "按分钟/ kWh 计费",
        appPackage: "com.evc.app",
        appStore: "https://play.google.com/store/apps/details?id=com.evc.app",
        iosStore: "https://apps.apple.com/my/app/jomcharge/id1451759100",
        deepLink: "jomcharge://"
      },
      {
        id: 50,
        name: "Pavilion KL (updated)",
        cpo: "ChargeSini",
        lat: 3.1490,
        lng: 101.7100,
        type: "DC",
        power: "60-150kW",
        connectors: "CCS2",
        status: "available",
        address: "Pavilion Kuala Lumpur",
        price: "约 RM1.40/kWh",
        appPackage: "com.chargesini.app",
        appStore: "https://play.google.com/store/apps/details?id=com.chargesini.app",
        iosStore: "https://apps.apple.com/my/app/chargesini/id6443502334",
        deepLink: "chargesini://"
      }
    ];

    // ==================== App State ====================
    let map = null;
    let userMarker = null;
    let stationMarkers = [];
    let userLat = 1.4927; // Default JB center
    let userLng = 103.7414;
    let currentFilter = "all";
    let selectedStation = null;
    let currentLang = 'zh';
    try {
      const savedLang = localStorage.getItem('evLang');
      if (savedLang) currentLang = savedLang;
    } catch (e) {
      console.warn('localStorage not available in this context');
    }

    // ==================== Translations (中英双语) ====================
    const i18n = {
      zh: {
        subtitle: "马来西亚充电地图 · 轻量版",
        nearby: "附近充电站",
        count: "个",
        all: "全部",
        dc: "DC 快充",
        ac: "AC 慢充",
        available: "可用",
        busy: "占用中",
        viewCharge: "查看 / 去充电",
        navigate: "导航",
        openApp: "打开运营商 App（未安装则跳转商店）",
        goNavigate: "导航前往",
        priceRef: "价格参考：",
        note: "备注：",
        openHint: "点击下方按钮会尝试打开对应运营商的官方 App。如果未安装，会引导你去应用商店下载。",
        emptyTitle: "附近暂时没有符合条件的充电站",
        emptyHint: "试试切换筛选条件",
        locating: "正在获取位置...",
        initMap: "正在初始化地图...",
        locateSuccess: "定位成功",
        locateFail: "定位失败，使用默认位置（新山）。请允许位置权限后重试。",
        noGeo: "浏览器不支持定位，使用默认位置（新山）",
        yourLocation: "你的位置"
      },
      en: {
        subtitle: "Malaysia EV Charging Map · Lite",
        nearby: "Nearby Stations",
        count: "",
        all: "All",
        dc: "DC Fast",
        ac: "AC Slow",
        available: "Available",
        busy: "Busy",
        viewCharge: "View / Charge",
        navigate: "Navigate",
        openApp: "Open Operator App (Store if not installed)",
        goNavigate: "Navigate There",
        priceRef: "Price ref: ",
        note: "Note: ",
        openHint: "Tap the button below to open the operator's official app. If not installed, it will redirect to the app store.",
        emptyTitle: "No matching stations nearby",
        emptyHint: "Try changing the filters",
        locating: "Getting your location...",
        initMap: "Initializing map...",
        locateSuccess: "Location found",
        locateFail: "Location failed, using default (Johor Bahru). Please allow location permission.",
        noGeo: "Geolocation not supported, using default (Johor Bahru)",
        yourLocation: "Your location"
      }
    };

    function t(key) {
      return i18n[currentLang][key] || key;
    }

    function updateLanguage() {
      // Header
      document.querySelector('.header-subtitle').textContent = t('subtitle');
      // List Modal Title
      const listTitle = document.getElementById('list-panel-title');
      if (listTitle) listTitle.textContent = t('nearby');
      // Filters (both main and list modal)
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = t(el.dataset.i18n);
      });
      // Modal buttons
      const openAppBtn = document.getElementById('btn-open-app');
      if (openAppBtn) openAppBtn.textContent = t('openApp');
      const navigateBtn = document.getElementById('btn-navigate');
      if (navigateBtn) navigateBtn.textContent = t('goNavigate');
      // Lang button
      document.getElementById('btn-lang').textContent = currentLang === 'zh' ? '中 / EN' : 'EN / 中';
      // Re-render list with new language
      renderStations();
      try {
        localStorage.setItem('evLang', currentLang);
      } catch (e) {
        console.warn('localStorage not available');
      }
    }

    // ==================== Initialize ====================
    function init() {
      showStatus(t('initMap'));
      
      map = L.map("map", {
        zoomControl: false,
        attributionControl: false
      }).setView([userLat, userLng], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
      }).addTo(map);

      L.control.zoom({ position: "bottomright" }).addTo(map);

      // Try get real location
      getUserLocation();

      // Event listeners
      document.getElementById("btn-locate").addEventListener("click", getUserLocation);
      document.getElementById("btn-refresh").addEventListener("click", () => {
        getUserLocation();
        renderStations();
      });
      document.getElementById("btn-lang").addEventListener("click", () => {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        updateLanguage();
      });
      document.getElementById("btn-nearby").addEventListener("click", () => {
        document.getElementById("list-modal-overlay").style.display = 'flex';
        renderStations(); // render to the list modal
      });
      document.getElementById("list-modal-close").addEventListener("click", () => {
        document.getElementById("list-modal-overlay").style.display = 'none';
      });
      document.getElementById("list-modal-overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("list-modal-overlay")) {
          document.getElementById("list-modal-overlay").style.display = 'none';
        }
      });
      document.getElementById("modal-close").addEventListener("click", closeModal);
      document.getElementById("modal-overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal-overlay")) closeModal();
      });

      // Filters (in list modal)
      document.querySelectorAll(".filter-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
          chip.classList.add("active");
          currentFilter = chip.dataset.filter;
          renderStations();
        });
      });

      // Apply saved language
      updateLanguage();
      renderStations();
    }

    // ==================== Geolocation ====================
    function getUserLocation() {
      showStatus(t('locating'));
      
      if (!navigator.geolocation) {
        showStatus(t('noGeo'), 3000);
        updateUserPosition(userLat, userLng);
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          updateUserPosition(userLat, userLng);
          showStatus(t('locateSuccess'), 1500);
          renderStations();
        },
        (err) => {
          console.warn(err);
          showStatus(t('locateFail'), 4000);
          updateUserPosition(userLat, userLng);
          renderStations();
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    function updateUserPosition(lat, lng) {
      if (userMarker) {
        userMarker.setLatLng([lat, lng]);
      } else {
        userMarker = L.circleMarker([lat, lng], {
          radius: 10,
          fillColor: "#3b82f6",
          color: "#fff",
          weight: 3,
          opacity: 1,
          fillOpacity: 0.9
        }).addTo(map).bindPopup(t('yourLocation'));
      }
      map.setView([lat, lng], 14);
    }

    // ==================== Distance Calculation ====================
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371; // km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLng/2) * Math.sin(dLng/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // ==================== Render Stations ====================
    function renderStations() {
      // Clear old markers
      stationMarkers.forEach(m => map.removeLayer(m));
      stationMarkers = [];

      let stations = MOCK_STATIONS.map(s => ({
        ...s,
        distance: getDistance(userLat, userLng, s.lat, s.lng)
      }));

      // Filter
      if (currentFilter === "dc") {
        stations = stations.filter(s => s.type === "DC");
      } else if (currentFilter === "ac") {
        stations = stations.filter(s => s.type === "AC");
      } else if (currentFilter !== "all") {
        stations = stations.filter(s => s.cpo === currentFilter);
      }

      // Sort by distance
      stations.sort((a, b) => a.distance - b.distance);

      // Update count (if element exists)
      const countEl = document.getElementById("nearby-count");
      if (countEl) countEl.textContent = currentLang === 'zh' ? `${stations.length} 个` : `${stations.length}`;

      // List
      const listEl = document.getElementById("list-station-list") || document.getElementById("station-list");
      if (stations.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔌</div>
            <div>${t('emptyTitle')}</div>
            <div style="font-size:0.8rem;margin-top:8px;">${t('emptyHint')}</div>
          </div>`;
      } else {
        listEl.innerHTML = stations.map(s => `
          <div class="station-card" data-id="${s.id}">
            <div class="station-top">
              <div>
                <div class="station-name">${s.name}</div>
                <div class="station-cpo">${s.cpo}</div>
              </div>
              <div class="station-distance">${s.distance < 1 ? (s.distance*1000).toFixed(0) + "m" : s.distance.toFixed(1) + "km"}</div>
            </div>
            <div class="station-meta">
              <span class="badge ${s.type === 'DC' ? 'badge-dc' : 'badge-ac'}">${s.type}</span>
              <span class="badge badge-power">${s.power}</span>
              <span class="badge badge-status ${s.status === 'busy' ? 'busy' : ''}">${s.status === 'available' ? t('available') : t('busy')}</span>
            </div>
            <div class="station-actions">
              <button class="btn btn-primary" onclick="event.stopPropagation(); openStation(${s.id})">
                ${t('viewCharge')}
              </button>
              <button class="btn btn-secondary" onclick="event.stopPropagation(); navigateTo(${s.lat}, ${s.lng})">
                ${t('navigate')}
              </button>
            </div>
          </div>
        `).join("");

        // Card click
        listEl.querySelectorAll(".station-card").forEach(card => {
          card.addEventListener("click", () => openStation(parseInt(card.dataset.id)));
        });
      }

      // Markers
      stations.forEach(s => {
        const isDC = s.type === "DC";
        const icon = L.divIcon({
          className: "",
          html: `<div class="custom-marker ${isDC ? 'dc' : ''}"></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 28]
        });

        const marker = L.marker([s.lat, s.lng], { icon })
          .addTo(map)
          .bindPopup(`<b>${s.name}</b><br>${s.cpo} · ${s.power}`);
        
        marker.on("click", () => openStation(s.id));
        stationMarkers.push(marker);
      });
    }

    // ==================== Open Station Detail ====================
    function openStation(id) {
      const s = MOCK_STATIONS.find(st => st.id === id);
      if (!s) return;
      selectedStation = s;

      document.getElementById("modal-cpo").textContent = s.cpo.substring(0, 2).toUpperCase();
      document.getElementById("modal-name").textContent = s.name;
      document.getElementById("modal-address").textContent = s.address;
      
      document.getElementById("modal-meta").innerHTML = `
        <span class="badge ${s.type === 'DC' ? 'badge-dc' : 'badge-ac'}">${s.type}</span>
        <span class="badge badge-power">${s.power}</span>
        <span class="badge badge-status ${s.status === 'busy' ? 'busy' : ''}">${s.status === 'available' ? t('available') : t('busy')}</span>
        <span class="badge" style="background:#e0e7ff;color:#3730a3;">${s.connectors}</span>
      `;

      document.getElementById("modal-info").innerHTML = `
        <p><strong>${t('priceRef')}</strong> ${s.price || (currentLang === 'zh' ? "请在App内查看" : "Check in app")}</p>
        ${s.note ? `<p style="margin-top:8px;"><strong>${t('note')}</strong> ${s.note}</p>` : ""}
        <p style="margin-top:12px;font-size:0.85rem;">${t('openHint')}</p>
      `;

      document.getElementById("btn-open-app").onclick = () => openCpoApp(s);
      document.getElementById("btn-navigate").onclick = () => navigateTo(s.lat, s.lng);

      document.getElementById("modal-overlay").classList.add("show");
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("show");
    }

    // ==================== Open CPO App ====================
    function openCpoApp(station) {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      const isAndroid = /android/i.test(ua);
      const storeUrl = isIOS ? station.iosStore : station.appStore;

      // Android: Use Intent URL (most reliable way to open specific app by package)
      if (isAndroid && station.appPackage) {
        // This Intent tries to open the app by package name.
        // If the app is not installed, Android will usually fall back or show an error,
        // so we also provide a manual store button.
        const intentUrl = `intent://#Intent;package=${station.appPackage};scheme=https;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
        
        // Try opening via Intent
        window.location.href = intentUrl;

        // As a safety net, also offer store after short delay (user can cancel)
        setTimeout(() => {
          // Optional: you can show a toast here later
        }, 2000);
        return;
      }

      // iOS or fallback: go directly to App Store / Play Store
      // (Most local Malaysian EV apps do not publicly support custom URL schemes)
      window.open(storeUrl, "_blank");
    }

    // ==================== Navigate ====================
    function navigateTo(lat, lng) {
      const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
      window.open(url, "_blank");
    }

    // ==================== UI Helpers ====================
    function showStatus(text, duration = 0) {
      const bar = document.getElementById("status-bar");
      document.getElementById("status-text").textContent = text;
      bar.classList.add("show");
      if (duration > 0) {
        setTimeout(() => bar.classList.remove("show"), duration);
      }
    }



    // ==================== Service Worker Registration (PWA) ====================
    try {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
            })
            .catch((err) => {
              console.warn('[PWA] Service Worker registration failed:', err);
            });
        });
      }
    } catch (e) {
      console.warn('Service Worker not available in this context');
    }

    // Start
    init();
  </script>
